<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Birthday Surprise ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

:root{
    --pink:#ff4d6d;
    --black:#0a0a0a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--black);
    color:white;
    font-family:'Courier New', Courier, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    text-align:center;
    transition:1s;
    position:relative;
}

/* CONTAINER */

.container{
    width:92%;
    max-width:450px;
    z-index:10;
}

/* STEPS */

.step{
    display:none;
    flex-direction:column;
    align-items:center;
    animation:fadeIn 1s ease;
}

.step.active{
    display:flex;
}

/* BUTTONS */

.btn{
    background:var(--pink);
    border:none;
    color:white;
    padding:14px 28px;
    border-radius:30px;
    cursor:pointer;
    margin-top:20px;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 4px 15px rgba(255,77,109,0.4);
}

.btn:hover{
    transform:scale(1.05);
    background:#ff1a4a;
}

/* SLIDESHOW */

.slideshow-container{
    position:relative;
    width:100%;
    height:60vh;
    max-height:500px;
    min-height:320px;
    margin-top:20px;
    overflow:hidden;
    border-radius:25px;
    border:4px solid #ff4d6d;
    box-shadow:0 0 30px rgba(255,77,109,0.7);
    background:black;
}

/* HEARTS TOP */

.slideshow-container::before{
    content:"❤️ ❤️ ❤️";
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
    font-size:22px;
    animation:heartGlow 2s infinite;
}

@keyframes heartGlow{

    0%{
        opacity:0.5;
        transform:translateX(-50%) scale(1);
    }

    50%{
        opacity:1;
        transform:translateX(-50%) scale(1.2);
    }

    100%{
        opacity:0.5;
        transform:translateX(-50%) scale(1);
    }
}

/* SLIDES */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
    opacity:0;
    transition:opacity 1.5s ease-in-out;
    border-radius:20px;
    cursor:pointer;
    padding:8px;
}

/* ACTIVE IMAGE */

.active-slide{
    opacity:1;
}

/* IMAGE HOVER */

.slide:hover{
    transform:scale(1.01);
    box-shadow:
    0 0 20px #ff4d6d,
    0 0 40px #ff4d6d,
    0 0 60px #ff4d6d;
}

/* FULL SCREEN */

#fullScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.96);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#fullScreen img{
    width:95%;
    max-width:800px;
    max-height:90vh;
    object-fit:contain;
    border-radius:20px;
    border:4px solid #ff4d6d;
    box-shadow:0 0 40px #ff4d6d;
}

/* MESSAGE BOX */

.typing-text{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    border-left:4px solid var(--pink);
    color:#00ffcc;
    text-align:left;
    line-height:1.7;
    height:300px;
    overflow-y:auto;
    font-size:20px;
    scrollbar-width:none;
}

.typing-text::-webkit-scrollbar{
    display:none;
}

/* FLOATING HEARTS */

.dot{
    position:absolute;
    background:#ff3355;
    border-radius:50% 0 50% 50%;
    transform:rotate(45deg);
    opacity:0.3;
    animation:floatUp 7s linear infinite;
}

@keyframes floatUp{

    0%{
        transform:translateY(110vh) rotate(45deg);
        opacity:0;
    }

    50%{
        opacity:0.5;
    }

    100%{
        transform:translateY(-10vh) rotate(405deg);
        opacity:0;
    }
}

/* FADE */

@keyframes fadeIn{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

/* MOBILE */

@media(max-width:600px){

    .container{
        width:95%;
    }

    .slideshow-container{
        height:55vh;
    }

    .typing-text{
        font-size:17px;
        height:260px;
    }

    .btn{
        font-size:15px;
        padding:12px 22px;
    }
}

</style>

</head>

<body>

<!-- MUSIC -->

<audio id="bgMusic" loop>
    <source src="birthday_song.mp3" type="audio/mpeg">
</audio>

<div class="container">

<!-- PAGE 1 -->

<div class="step active" id="step1">

    <h1 style="color:#ff4d6d;">
        🎂 It's Your Special Day ❤️
    </h1>

    <p style="margin-top:15px;">
        Today is all about you ✨
    </p>

    <button class="btn"
        onclick="nextStep(2)">
        NEXT ➜
    </button>

</div>

<!-- PAGE 2 -->

<div class="step" id="step2">

    <h2>
        ❤️ A Special Surprise ❤️
    </h2>

    <p style="margin-top:15px;">
        Because you are very special to me ❤️
    </p>

    <button class="btn"
        onclick="nextStep(3)">
        CONTINUE ✨
    </button>

</div>

<!-- PAGE 3 -->

<div class="step" id="step3">

    <h2>
        👀 Wanna See What I Made?
    </h2>

    <div style="display:flex; gap:20px; margin-top:20px;">

        <button class="btn"
            onclick="nextStep(4)">
            YES 😍
        </button>

        <button class="btn"
            onclick="showNoMessage()">
            NO 🙈
        </button>

    </div>

    <p id="noMsg"
       style="margin-top:20px;color:#ff4d6d;">
    </p>

</div>

<!-- PAGE 4 -->

<div class="step" id="step4">

    <h1>
        🎵 Ready For Music?
    </h1>

    <button class="btn"
        onclick="startMusic(); nextStep(5)">
        PLAY MUSIC ▶
    </button>

</div>

<!-- PAGE 5 -->

<div class="step" id="step5">

    <h1>
        💡 Turn On The Lights ✨
    </h1>

    <button class="btn"
        onclick="lightsOn(); nextStep(6)">
        LIGHTS ON 💡
    </button>

</div>

<!-- PAGE 6 -->

<div class="step" id="step6">

    <h1 style="font-size:80px;">
        🎂
    </h1>

    <h2>
        Time To Cut The Cake ✨
    </h2>

    <button class="btn"
        onclick="showCakeMessage()">
        CUT THE CAKE 🔪
    </button>

    <p id="cakeMsg"
       style="
       margin-top:20px;
       color:black;
       font-size:22px;">
    </p>

    <button class="btn"
        id="cakeNextBtn"
        style="display:none;"
        onclick="celebrate(); nextStep(7)">
        NEXT SURPRISE 🎉
    </button>

</div>

<!-- PAGE 7 -->

<div class="step" id="step7">

    <h2 style="color:#ff4d6d;">
        📸 Beautiful Memories 📸
    </h2>

    <div class="slideshow-container">

        <!-- CHANGE PHOTO NAMES -->

        <img class="slide active-slide"
             src="photo1.jpg"
             onclick="openFull(this.src)">

        <img class="slide"
             src="photo2.jpg"
             onclick="openFull(this.src)">

        <img class="slide"
             src="photo3.jpg"
             onclick="openFull(this.src)">

        <img class="slide"
             src="photo4.jpg"
             onclick="openFull(this.src)">

    </div>

    <button class="btn"
        onclick="nextStep(8)">
        FINAL SURPRISE 🎁
    </button>

</div>

<!-- PAGE 8 -->

<div class="step" id="step8">

    <div id="typewriter"
         class="typing-text">
    </div>

    <button class="btn"
        onclick="location.reload()">
        REPLAY 🔄
    </button>

</div>

</div>

<!-- FULL SCREEN -->

<div id="fullScreen"
     onclick="closeFull()">

    <img id="fullImg">

</div>

<script>

const message =

`Dear ❤️

You are one of the most special persons in my life.

Thank you for all the smiles,
support,
care,
and memories 💖

May your life always shine with happiness,
success,
love,
and endless joy 🎂✨

Happy Birthday Once Again ❤️`;

function nextStep(num){

    document.querySelectorAll('.step')
    .forEach(step =>
        step.classList.remove('active'));

    document.getElementById('step'+num)
    .classList.add('active');

    if(num === 8){
        typeWriter();
    }
}

/* MUSIC */

function startMusic(){

    document.getElementById('bgMusic')
    .play();
}

/* NO BUTTON */

function showNoMessage(){

    document.getElementById('noMsg')
    .innerHTML =
    "😎 Smart people click YES!";
}

/* LIGHTS */

function lightsOn(){

    document.body.style.background = "white";
    document.body.style.color = "black";
}

/* CAKE */

function showCakeMessage(){

    document.getElementById('cakeMsg')
    .innerHTML =
    "😂 There is no cake... first give party! 🎉";

    document.getElementById('cakeNextBtn')
    .style.display = "inline-block";
}

/* CONFETTI */

function celebrate(){

    confetti({
        particleCount:200,
        spread:100,
        origin:{ y:0.6 },
        colors:['#ff4d6d','#ffffff','#ffd700']
    });
}

/* TYPEWRITER */

function typeWriter(){

    let i = 0;

    const target =
    document.getElementById("typewriter");

    target.innerHTML = "";

    function type(){

        if(i < message.length){

            target.innerHTML +=
            message.charAt(i) === "\n"
            ? "<br>"
            : message.charAt(i);

            i++;

            target.scrollTop =
            target.scrollHeight;

            setTimeout(type,80);
        }
    }

    type();
}

/* FULLSCREEN */

function openFull(src){

    document.getElementById("fullScreen")
    .style.display = "flex";

    document.getElementById("fullImg")
    .src = src;
}

function closeFull(){

    document.getElementById("fullScreen")
    .style.display = "none";
}

/* AUTO SLIDESHOW */

let slideIndex = 0;

const slides =
document.querySelectorAll(".slide");

function autoSlide(){

    slides.forEach(slide =>
        slide.classList.remove("active-slide"));

    slideIndex++;

    if(slideIndex >= slides.length){
        slideIndex = 0;
    }

    slides[slideIndex]
    .classList.add("active-slide");
}

/* CHANGE IMAGE EVERY 4 SECONDS */

setInterval(autoSlide, 4000);

/* FLOATING HEARTS */

function createDots(){

    for(let i=0;i<25;i++){

        const dot =
        document.createElement('div');

        dot.className='dot';

        const size =
        Math.random()*12+5+'px';

        dot.style.width=size;
        dot.style.height=size;

        dot.style.left=
        Math.random()*100+'vw';

        dot.style.animationDelay=
        Math.random()*5+'s';

        dot.style.animationDuration=
        (Math.random()*3+4)+'s';

        document.body.appendChild(dot);
    }
}

createDots();

</script>

</body>
</html>
